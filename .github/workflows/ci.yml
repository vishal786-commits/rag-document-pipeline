# It builds the Docker image and pushes it to AWS ECR.

name: CI - Build and Push Docker Image to ECR

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch: # Adds a 'Run workflow' button in GitHub Actions UI 
  
# ENVIRONMENT VARIABLES available to all jobs   
env: 
    AWS_REGION: ap-south-1 
    ECR_REPOSITORY: docmind

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
    env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: latest
    run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\
            $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Push Docker image to ECR
    env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: latest
    run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    
    -name: Output image details
    env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: latest
    run: |
        echo "Docker image pushed to ECR: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        echo "Latest tag pushed to ECR: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
        